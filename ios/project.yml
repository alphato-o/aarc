name: AARC
options:
  bundleIdPrefix: club.aarun
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    # Hardcoded so xcodegen regenerations don't blank the AARC target's
    # signing config. Watch target keeps its own (manual) signing block;
    # both happen to use the same team.
    DEVELOPMENT_TEAM: GK7889VKDF
    ENABLE_HARDENED_RUNTIME: NO
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "152"
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  AARCKit:
    path: AARCKit

targets:
  AARC:
    type: application
    platform: iOS
    sources:
      - path: AARC
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: club.aarun.AARC
        PRODUCT_NAME: AARC
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: AARC/Info.plist
        CODE_SIGN_ENTITLEMENTS: AARC/AARC.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: AARCKit
      - target: AARCWatch
        embed: true
      - target: AARCLiveActivity
        embed: true
    postBuildScripts:
      - name: Stamp Build Number
        basedOnDependencyAnalysis: false
        script: |
          # TestFlight-legal versioning: CFBundleShortVersionString stays
          # the semantic MARKETING_VERSION and CFBundleVersion stays the
          # plain bumped build number (App Store Connect requires X.Y.Z
          # formats). The build DATETIME the founder wants visible rides
          # a custom AARCBuildStamp key instead, displayed by AppVersion.
          set -e
          versionStamp="$(date +%Y%m%d%H%M)"
          plutil -replace AARCBuildStamp -string "$versionStamp" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          echo "Stamped AARCBuildStamp = $versionStamp"

  AARCLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: AARCLiveActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: club.aarun.AARC.LiveActivity
        PRODUCT_NAME: AARCLiveActivity
        INFOPLIST_FILE: AARCLiveActivity/Info.plist
        CODE_SIGN_ENTITLEMENTS: AARCLiveActivity/AARCLiveActivity.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SKIP_INSTALL: NO
        # Live Activity widget + LastRunWidget home-screen widget;
        # bundle is loaded by the host iOS app.
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: AARCKit
    postBuildScripts:
      - name: Stamp Build Number
        basedOnDependencyAnalysis: false
        script: |
          set -e
          versionStamp="$(date +%Y%m%d%H%M)"
          plutil -replace AARCBuildStamp -string "$versionStamp" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          echo "Stamped AARCBuildStamp = $versionStamp"

  AARCWatch:
    type: application
    platform: watchOS
    sources:
      - path: AARCWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: club.aarun.AARC.watchkitapp
        PRODUCT_NAME: AARCWatch
        INFOPLIST_FILE: AARCWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: AARCWatch/AARCWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        TARGETED_DEVICE_FAMILY: "4"
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        ENABLE_PREVIEWS: YES
        # Manual signing: auto-signing on this team minted iOS-platform profiles
        # for the watch target, which fail validation on the watch itself with
        # MIInstallerError 0xe8008015. The Portal-issued watchOS profile is
        # named "AARC Watch Development".
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Development"
        PROVISIONING_PROFILE_SPECIFIER: "AARC Watch Development"
        DEVELOPMENT_TEAM: GK7889VKDF
    dependencies:
      - package: AARCKit
    postBuildScripts:
      - name: Stamp Build Number
        basedOnDependencyAnalysis: false
        script: |
          set -e
          versionStamp="$(date +%Y%m%d%H%M)"
          plutil -replace AARCBuildStamp -string "$versionStamp" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          echo "Stamped AARCBuildStamp = $versionStamp"

  AARCTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AARCTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: club.aarun.AARC.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AARC.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AARC"
    dependencies:
      - target: AARC

schemes:
  AARC:
    build:
      targets:
        AARC: all
        AARCWatch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AARCTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
